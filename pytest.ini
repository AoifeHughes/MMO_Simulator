[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
timeout = 30
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
# Ignore scenario tests and problematic files
addopts = --ignore=tests/test_pathfinding_scenario.py --ignore=tests/test_scenarios.py --ignore=tests/test_forest_fisher_scenario.py --ignore=tests/performance/test_load_scenarios.py --ignore=scenarios/ --ignore=tests/test_enemy_agents.py --ignore=tests/test_explorer_agents.py --ignore=tests/test_npc_agents.py --ignore=tests/test_network.py --ignore=tests/test_integration.py --ignore=tests/test_pathfinding.py
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    agent: marks tests for specific agent behavior
    network: marks tests for network functionality
    timeout: marks tests with timeout requirements
